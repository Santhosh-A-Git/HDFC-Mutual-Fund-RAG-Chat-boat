name: Daily Data Ingestion

on:
  schedule:
    # Run at 10:30 AM IST (05:00 AM UTC) every day
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ingest-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Ingestion Pipeline
        run: |
          python src/ingestion/ingest.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit Updated ChromaDB
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/chroma_db/
          # Commit the new database files if there are any changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Daily ChromaDB Vector Update" && git push)
